[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
releaseCommand = "php artisan migrate --force && php artisan config:cache && php artisan route:cache"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"

[[services]]
name = "worker"
startCommand = "php artisan queue:work redis --sleep=3 --tries=3 --timeout=90"
